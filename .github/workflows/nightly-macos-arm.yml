name: Nightly — macOS ARM

# ============================================================================
# Platform: macOS 15 arm64 (Apple Silicon)
# Profiles:  APP
# Schedule:  nightly (selected platform)
# Release:   called by release.yml via workflow_call
# Manual:    workflow_dispatch on this file
# ============================================================================
#
# Change detection is handled by the caller (nightly-builds.yml) for
# scheduled runs. workflow_dispatch on this file always proceeds.

run-name: >-
  ${{ github.event_name == 'schedule'
    && format('Nightly macOS ARM [{0}]', github.run_started_at)
    || github.event_name == 'workflow_call'
    && format('Release macOS ARM [{0}]', inputs.ref)
    || format('Manual macOS ARM by @{0}', github.actor) }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA"
        required: false
        default: main
        type: string
      clean_tier:
        description: "Clean tier"
        required: false
        default: incremental
        type: choice
        options: [incremental, rebuild, clean, clean-purge-cache]
      artifact_retention_days:
        description: "Artifact retention (days)"
        required: false
        default: "3"
        type: choice
        options: ["3","7","14","30"]

  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or SHA"
        required: false
        type: string
        default: main
      clean_tier:
        required: false
        type: string
        default: incremental
      artifact_name_prefix:
        required: false
        type: string
        default: ""
      artifact_retention_days:
        required: false
        type: number
        default: 3

permissions:
  contents: write
  actions: write

jobs:

  # --------------------------------------------------------------------------
  # PHASE 1 — CACHE PROBE
  # --------------------------------------------------------------------------
  probe-app:
    name: "Probe: macos-15 / qt6 / APP"
    runs-on: macos-15
    outputs:
      cache-hit: ${{ steps.probe.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 1
      - id: probe
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/us3-vcpkg-cache
          key: vcpkg-macos-15-qt6-APP-${{ hashFiles('vcpkg.json', 'admin/cmake/**', 'buildsys/vcpkg/overlay-ports/**', 'scripts/warm-cache.sh') }}
          lookup-only: true

  # --------------------------------------------------------------------------
  # PHASE 2 — CONDITIONAL WARM
  # --------------------------------------------------------------------------
  warm-if-needed:
    name: "Warm macos-15 cache (if miss)"
    needs: [probe-app]
    if: needs.probe-app.outputs.cache-hit != 'true'
    uses: ehb54/uslims_version_workflows/.github/workflows/ultrascan-warm-cache.yml@bfd00d222bcdfa0d8375562f9ffe8cff81e6cb18
    with:
      ref:        ${{ inputs.ref || 'main' }}
      platforms:  "macos-arm (macos-15)"
      qt_variant: qt6
    secrets: inherit

  # --------------------------------------------------------------------------
  # PHASE 3 — BUILD
  # --------------------------------------------------------------------------
  build-app:
    name: "macOS ARM APP (macos-15, qt6)"
    needs: [probe-app, warm-if-needed]
    if: ${{ !cancelled() }}
    uses: ehb54/uslims_version_workflows/.github/workflows/ultrascan-reusable-build.yml@bfd00d222bcdfa0d8375562f9ffe8cff81e6cb18
    with:
      ref:                     ${{ inputs.ref || 'main' }}
      runner:                  macos-15
      qt_variant:              qt6
      profile:                 APP
      clean_tier:              ${{ inputs.clean_tier || 'incremental' }}
      artifact_name_prefix:    ${{ format('{0}-arm', inputs.artifact_name_prefix || format('nightly-{0}', github.run_id)) }}
      artifact_retention_days: ${{ fromJson(inputs.artifact_retention_days || '3') }}
