name: Build — Oracle Linux 8

# ============================================================================
# Reusable platform build workflow: Oracle Linux 8.10 x64
#   (oraclelinux:8 container on ubuntu-24.04)
# Profiles:  APP + HPC
# Callers:   nightly-build.yml (scheduled, Group 2) and on-demand-build.yml
#            (manual dispatch) invoke this via workflow_call.
# Standalone: workflow_dispatch on this file for one-off builds; runs
#             probe → warm → build
#             pre-release when no artifact_name_prefix is supplied by a caller.
# Note:      release.yml calls ultrascan-reusable-build.yml (external) directly
#            and does NOT invoke this workflow.
# ============================================================================
#
# Change detection for scheduled nightly runs is handled by nightly-build.yml.
# Calls from on-demand-build.yml and direct workflow_dispatch always proceed.

# build-oraclelinux.yml
run-name: >-
  ${{ github.event_name == 'workflow_call'
    && format('Oracle Linux 8 [{0}]', inputs.ref)
    || format('Manual Oracle Linux 8 by @{0}', github.actor) }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA"
        required: false
        default: main
        type: string
      clean_tier:
        description: "Clean tier"
        required: false
        default: incremental
        type: choice
        options: [incremental, rebuild, clean, clean-purge-cache]
      artifact_retention_days:
        description: "Artifact retention (days)"
        required: false
        default: "3"
        type: choice
        options: ["3","7","14","30"]

  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: main
      clean_tier:
        required: false
        type: string
        default: incremental
      artifact_name_prefix:
        required: false
        type: string
        default: ""
      artifact_retention_days:
        required: false
        type: number
        default: 3

permissions:
  contents: write
  actions: write

jobs:

  # --------------------------------------------------------------------------
  # PHASE 1 — CACHE PROBES  (oraclelinux8-specific keys, no container needed)
  # --------------------------------------------------------------------------
  probe-app:
    name: "Probe: oraclelinux8 / qt6 / APP"
    runs-on: ubuntu-24.04
    outputs:
      cache-hit: ${{ steps.probe.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 1
      - id: probe
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/us3-vcpkg-cache
          key: vcpkg-oraclelinux8-qt6-APP-${{ hashFiles('vcpkg.json', 'admin/cmake/**', 'buildsys/vcpkg/overlay-ports/**', 'scripts/warm-cache.sh') }}
          lookup-only: true

  probe-hpc:
    name: "Probe: oraclelinux8 / qt6 / HPC"
    runs-on: ubuntu-24.04
    outputs:
      cache-hit: ${{ steps.probe.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 1
      - id: probe
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/us3-vcpkg-cache
          key: vcpkg-oraclelinux8-qt6-HPC-${{ hashFiles('vcpkg.json', 'admin/cmake/**', 'buildsys/vcpkg/overlay-ports/**', 'scripts/warm-cache.sh') }}
          lookup-only: true

  # --------------------------------------------------------------------------
  # PHASE 2 — CONDITIONAL WARM  (oraclelinux8 platform only)
  # --------------------------------------------------------------------------
  warm-if-needed:
    name: "Warm oraclelinux8 caches (if any miss)"
    needs: [probe-app, probe-hpc]
    if: |
      needs.probe-app.outputs.cache-hit != 'true' ||
      needs.probe-hpc.outputs.cache-hit != 'true'
    uses: ehb54/uslims_version_workflows/.github/workflows/ultrascan-warm-cache.yml@aacc200d0c68de5d0840c15567b484aac9a8018e
    with:
      ref:        ${{ inputs.ref || 'main' }}
      platforms:  "oraclelinux8-x64"
      qt_variant: qt6
    secrets: inherit

  # --------------------------------------------------------------------------
  # PHASE 3 — BUILDS
  # --------------------------------------------------------------------------
  build-app:
    name: "OracleLinux8 APP (qt6)"
    needs: [probe-app, probe-hpc, warm-if-needed]
    if: ${{ !cancelled() }}
    uses: ehb54/uslims_version_workflows/.github/workflows/ultrascan-reusable-build.yml@aacc200d0c68de5d0840c15567b484aac9a8018e
    with:
      ref:                     ${{ inputs.ref || 'main' }}
      runner:                  ubuntu-24.04
      cache_os_label:          oraclelinux8
      qt_variant:              qt6
      profile:                 APP
      clean_tier:              ${{ inputs.clean_tier || 'incremental' }}
      artifact_name_prefix:    ${{ inputs.artifact_name_prefix || format('nightly-oraclelinux8-{0}', github.run_id) }}
      artifact_retention_days: ${{ fromJson(inputs.artifact_retention_days || '3') }}

  build-hpc:
    name: "OracleLinux8 HPC (qt6)"
    needs: [probe-app, probe-hpc, warm-if-needed]
    if: ${{ !cancelled() }}
    uses: ehb54/uslims_version_workflows/.github/workflows/ultrascan-reusable-build.yml@aacc200d0c68de5d0840c15567b484aac9a8018e
    with:
      ref:                     ${{ inputs.ref || 'main' }}
      runner:                  ubuntu-24.04
      cache_os_label:          oraclelinux8
      qt_variant:              qt6
      profile:                 HPC
      clean_tier:              ${{ inputs.clean_tier || 'incremental' }}
      artifact_name_prefix:    ${{ format('{0}-HPC', inputs.artifact_name_prefix || format('nightly-oraclelinux8-{0}', github.run_id)) }}
      artifact_retention_days: ${{ fromJson(inputs.artifact_retention_days || '3') }}

