name: UltraScan3 Nightly Build

run-name: >-
  ${{ github.event_name == 'schedule'
    && format('Nightly [main] {0}', github.run_started_at)
    || format('Nightly [manual] by @{0}', github.actor) }}

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:

  # =========================================================================
  # PHASE 0 — CHANGE DETECTION
  # Single authoritative gate for the entire nightly run.
  # All platform jobs and publish-release are conditioned on this output.
  # workflow_dispatch always proceeds (has_changes=true).
  # =========================================================================
  check-changes:
    name: "Check for changes in last 24h"
    runs-on: ubuntu-24.04
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - name: Detect commits in last 24 hours
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT=$(git log --oneline --since="24 hours ago" origin/main | wc -l | tr -d ' ')
          echo "Commits in last 24h: $COUNT"
          echo "has_changes=$( [[ $COUNT -gt 0 ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # PLATFORM BUILDS — two parallel groups to reduce wall time while keeping
  # peak cache usage under the 10 GB Actions quota.
  #
  # Each platform workflow owns its own probe → warm → build chain using
  # isolated key namespaces (vcpkg-ubuntu-24.04-*, vcpkg-macos-15-*, etc.),
  # so parallel runs do not contend on cache keys.
  #
  # Group 1 (parallel): ubuntu + macos-arm
  #   Combined final keys ~3.9 GB; ubuntu intermediates are small.
  #   Peak well within quota while both warm pipelines overlap.
  #
  # Group 2 (parallel, after group 1): oraclelinux8 + macos-intel
  #   Group 1 intermediates are cleaned up before group 2 starts.
  #   oraclelinux8 is small; intel final key ~1 GB.
  #
  # Group 3 (after group 2): windows
  # =========================================================================

  # --- Group 1 (parallel) ---------------------------------------------------

  ubuntu:
    name: "Ubuntu 24.04 (APP + HPC)"
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/nightly-ubuntu.yml
    with:
      ref:                     main
      clean_tier:              incremental
      artifact_name_prefix:    ${{ format('nightly-{0}', github.run_id) }}
      artifact_retention_days: 3
    secrets: inherit

  macos-arm:
    name: "macOS ARM (APP)"
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/nightly-macos-arm.yml
    with:
      ref:                     main
      clean_tier:              incremental
      artifact_name_prefix:    ${{ format('nightly-{0}', github.run_id) }}
      artifact_retention_days: 3
    secrets: inherit

  # --- Group 2 (parallel, after group 1) ------------------------------------

  oraclelinux8:
    name: "Oracle Linux 8 x64 (APP + HPC)"
    needs: [check-changes, ubuntu, macos-arm]
    if: needs.check-changes.outputs.has_changes == 'true' && !cancelled()
    uses: ./.github/workflows/nightly-oraclelinux8.yml
    with:
      ref:                     main
      clean_tier:              incremental
      artifact_name_prefix:    ${{ format('nightly-{0}', github.run_id) }}
      artifact_retention_days: 3
    secrets: inherit

  macos-intel:
    name: "macOS Intel (APP)"
    needs: [check-changes, ubuntu, macos-arm]
    if: needs.check-changes.outputs.has_changes == 'true' && !cancelled()
    uses: ./.github/workflows/nightly-macos-intel.yml
    with:
      ref:                     main
      clean_tier:              incremental
      artifact_name_prefix:    ${{ format('nightly-{0}', github.run_id) }}
      artifact_retention_days: 3
    secrets: inherit

  # --- Group 3 (after group 2) -----------------------------------------------

  windows:
    name: "Windows x64 (APP)"
    needs: [check-changes, oraclelinux8, macos-intel]
    if: needs.check-changes.outputs.has_changes == 'true' && !cancelled()
    uses: ./.github/workflows/nightly-windows.yml
    with:
      ref:                     main
      clean_tier:              incremental
      artifact_name_prefix:    ${{ format('nightly-{0}', github.run_id) }}
      artifact_retention_days: 3
    secrets: inherit

  # =========================================================================
  # PHASE 4 — PUBLISH RELEASE
  # Runs only when all builds succeed. Downloads all run artifacts, renames
  # each to a stable filename, then publishes/overwrites the rolling `nightly`
  # GitHub Release. The release assets are the canonical distribution —
  # artifact retention stays at 3 days.
  # =========================================================================

  publish-release:
    name: "Publish Nightly Release"
    needs:
      - check-changes
      - ubuntu
      - oraclelinux8
      - macos-arm
      - macos-intel
      - windows
    if: needs.check-changes.outputs.has_changes == 'true' && success()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: nightly-*
          path: artifacts
          run-id: ${{ github.run_id }}

      - name: Stage assets with stable filenames
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          LABEL="nightly-${DATE}-${SHORT_SHA}"

          cp_first() {
            local pattern="$1" dest="$2"
            local src
            src=$(find artifacts -path "$pattern" | head -1)
            [ -n "$src" ] || { echo "ERROR: no file matching $pattern"; exit 1; }
            cp "$src" "release-assets/$dest"
            echo "  $dest <- $src"
          }

          echo "Staging release assets (label: ${LABEL})..."

          # macOS artifacts (pkg, not .tar.xz)
          cp_first "artifacts/nightly-*-arm-macos-15-[0-9]*/UltraScan3-*-macOS.pkg" \
            "UltraScan3-macos-installer-arm64-${LABEL}.pkg"
          cp_first "artifacts/nightly-*-macos-15-intel-*/UltraScan3-*-macOS.pkg" \
            "UltraScan3-macos-installer-x86_64-${LABEL}.pkg"

          # Windows (exe)
          cp_first "artifacts/nightly-*-windows-2022-*/UltraScan3-*-Windows.exe" \
            "us3-Windows-x86_64-${LABEL}-setup.exe"

          # Ubuntu 24.04 (.tar.xz from build system)
          cp_first "artifacts/nightly-*-ubuntu-24.04-[0-9]*/UltraScan3-*-Linux-*.tar.xz" \
            "us3-ubuntu-24.04-x86_64-${LABEL}.tar.xz"
          cp_first "artifacts/nightly-*-HPC-ubuntu-24.04-[0-9]*/UltraScan3-HPC-*-Linux-*.tar.xz" \
            "us3-HPC-ubuntu-24.04-x86_64-${LABEL}.tar.xz"

          # Oracle Linux 8 / RHEL 8 (.tar.xz from build system)
          cp_first "artifacts/nightly-*-oraclelinux8-[0-9]*/UltraScan3-*-Linux-*.tar.xz" \
            "us3-redhat-8.10-x86_64-${LABEL}.tar.xz"
          cp_first "artifacts/nightly-*-HPC-oraclelinux8-[0-9]*/UltraScan3-HPC-*-Linux-*.tar.xz" \
            "us3-HPC-redhat-8.10-x86_64-${LABEL}.tar.xz"

          echo "Assets ready:"
          ls -lh release-assets/

          # Export label for publish step
          echo "label=${LABEL}" >> "$GITHUB_ENV"

      - name: Publish rolling nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          LABEL="${label}"
          COMMIT=$(git rev-parse HEAD)
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          NOTES="## UltraScan3 Nightly Build

          **Date:** $DATE
          **Commit:** $COMMIT

          Automated nightly build from \`main\`. All platforms passed.

          | Asset | Platform | Profile |
          |-------|----------|---------|
          | \`UltraScan3-macos-installer-arm64-${LABEL}.pkg\`         | macOS arm64 (Apple Silicon) | Desktop |
          | \`UltraScan3-macos-installer-x86_64-${LABEL}.pkg\`        | macOS x86_64 (Intel)        | Desktop |
          | \`us3-Windows-x86_64-${LABEL}-setup.exe\`                 | Windows x86_64              | Desktop |
          | \`us3-ubuntu-24.04-x86_64-${LABEL}.tar.xz\`               | Ubuntu 24.04 x86_64         | Desktop |
          | \`us3-HPC-ubuntu-24.04-x86_64-${LABEL}.tar.xz\`           | Ubuntu 24.04 x86_64         | HPC/MPI |
          | \`us3-redhat-8.10-x86_64-${LABEL}.tar.xz\`               | Oracle Linux 8 / RHEL 8 x86_64 | Desktop |
          | \`us3-HPC-redhat-8.10-x86_64-${LABEL}.tar.xz\`           | Oracle Linux 8 / RHEL 8 x86_64 | HPC/MPI |"

          # Delete existing nightly release and tag if present
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          sleep 2

          # Create new release with all assets
          gh release create nightly release-assets/* \
            --title "Nightly Build" \
            --notes "$NOTES" \
            --prerelease \
            --target main
